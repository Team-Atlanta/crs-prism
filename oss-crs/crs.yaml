name: crs-prism
type:
  - bug-fixing
version: 1.0.0
docker_registry: ghcr.io/team-atlanta/crs-prism

prepare_phase:
  hcl: oss-crs/docker-bake.hcl

target_build_phase:
  - name: default-build
    dockerfile: oss-crs/builder.Dockerfile
    outputs:
      - build
      - src
  - name: inc-builder-asan
    snapshot: true
    dockerfile: oss-crs-infra:default-builder
    additional_env:
      SANITIZER: address

crs_run_phase:
  patcher:
    dockerfile: oss-crs/patcher.Dockerfile
    additional_env:
      CRS_AGENT: prism
      # PRISM_MODEL: o4-mini  # Optional override (default if unset)
      # PRISM_BACKUP_MODEL: claude-sonnet-4-20250514
      # AGENT_TIMEOUT: "0"  # seconds, 0 = no limit (default)
      # BUILDER_MODULE: "inc-builder-asan"  # Builder sidecar module (must match run_snapshot module name)
  inc-builder-asan:
    run_snapshot: true
    dockerfile: oss-crs-infra:default-builder

supported_target:
  mode:
    - full
    - delta
  language:
    - c
    - c++
    - jvm
  sanitizer:
    - address
    - undefined
  architecture:
    - x86_64

required_llms:
  - o4-mini
  - claude-sonnet-4-20250514
